<!DOCTYPE html>
<html>
<head>
  <title>Admin Login | Assessment Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #1a2535;
      padding: 40px;
    }

    .card {
      background: white;
      border: 1px solid #d0d7e0;
      border-radius: 8px;
      padding: 24px;
      max-width: 420px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 12px 0;
      border: 1px solid #b0bac8;
      border-radius: 6px;
    }

    button {
      padding: 10px 16px;
      background: #1d5fa7;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Admin Login</h1>
    <p>Enter admin password to access assessment data.</p>

    <form action="/admin" method="POST">
      <div style="margin-bottom:12px;">
    <input
        type="password"
        id="adminPassword"
        name="password"
        placeholder="Admin password"
        required
        style="width:100%;"
    >

    <label style="display:block; margin-top:8px;">
        <input type="checkbox" onclick="togglePassword()">
        Show password
    </label>
</div>
      <button type="submit">Login</button>
    </form>
  </div>
<script>
function togglePassword() {
    const field = document.getElementById("adminPassword");

    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }
}
</script>
</body>
</html>
