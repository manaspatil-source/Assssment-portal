<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continue Assessment</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f3f5f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1e293b;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: white;
    border: 1px solid #d6dee8;
    border-radius: 12px;
    padding: 2.2rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: #e8f0fb;
    color: #1d5fa7;
    border: 1px solid #bfd3ee;
    padding: 0.25rem 0.7rem;
    border-radius: 5px;
    margin-bottom: 1rem;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 0.7rem;
    color: #1e293b;
  }

  p {
    color: #64748b;
    line-height: 1.6;
    margin-bottom: 0.9rem;
    font-size: 0.95rem;
  }

  .status-box {
    background: #f8fafc;
    border: 1px solid #dbe4ee;
    border-radius: 8px;
    padding: 1rem;
    margin: 1.3rem 0;
  }

  .status-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    color: #64748b;
    margin-bottom: 0.35rem;
  }

  .status-value {
    font-family: "Courier New", monospace;
    font-size: 1rem;
    color: #1d4ed8;
    font-weight: 700;
  }

  button {
    width: 100%;
    border: none;
    background: #1d5fa7;
    color: white;
    padding: 0.85rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button:hover {
    background: #174e8c;
  }
</style>
</head>

<body>

<div class="card">

  <div class="badge">
    Assessment Portal
  </div>

  <h1>Resume Assessment</h1>

  <p>
    An unfinished assessment session was detected for this account.
  </p>

  <p>
    You may continue from your last saved position.
  </p>

  <div class="status-box">
    <div class="status-label">Last Saved Page</div>
    <div class="status-value">{{ current_page }}</div>
  </div>

  <form method="POST" action="/continue_test">
    <button type="submit">
      Continue Assessment →
    </button>
  </form>

</div>

</body>
</html>
