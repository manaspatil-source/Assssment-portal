<!DOCTYPE html>
<html>
<head>
    <title>Assessment Login</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #1a2535;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border: 1px solid #d0d7e0;
            border-radius: 8px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.10);
            padding: 2rem;
        }

        .badge {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #1d5fa7;
            background: #e8f0fb;
            border: 1px solid #c0d3ef;
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            margin-bottom: 0.8rem;
        }

        h2 {
            font-size: 1.45rem;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #6b7a90;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        label {
            font-size: 0.78rem;
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.65rem 0.8rem;
            margin-top: 0.35rem;
            margin-bottom: 1rem;
            border: 1px solid #b0bac8;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus {
            border-color: #1d5fa7;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #1d5fa7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #174e8c;
        }

        .note {
            margin-top: 1rem;
            font-size: 0.78rem;
            color: #6b7a90;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="badge">Secure Assessment Access</div>

        <h2>Cognitive Reasoning Assessment</h2>

        <p class="subtitle">
            Enter your authorized email and password to begin. This assessment can only be attempted once.
        </p>

        <form method="POST" action="/login">
            <label>Username</label>
<input type="text" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Start Assessment</button>
        </form>

        <p class="note">
            Authorized candidates only. Please do not refresh or close the assessment once started.
        </p>
    </div>
</body>
</html>
